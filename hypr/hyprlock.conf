# ============================================================
# CONFIGURACIÓN DE HYPRLOCK
# ============================================================

background {
    monitor =
    path = ~/Pictures/fondo de pantalla/aguila.jpg
    blur_passes = 0
}

# Fecha (arriba)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d de %B"
    color = rgba(255, 255, 255, 0.8)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

# Hora (abajo)
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgb(255, 255, 255)
    font_size = 200
    font_family = JetBrainsMono Nerd Font
    position = 0, -300
    halign = center
    valign = center
}

# Campo de contraseña (medio)
input-field {
    monitor =
    size = 400, 50
    position = 0, -140
    halign = center
    valign = center
    font_color = rgb(255, 255, 255)
    inner_color = rgba(0, 0, 0, 0.6)
    outer_color = rgba(255, 255, 255, 0.2)
    font_family = JetBrainsMono Nerd Font
    placeholder_text = 
    fail_text = 
}
